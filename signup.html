<!DOCTYPE html>
<html lang="en">
<head>
  <title>Sign Up - Momenta</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="auth-container">
    <h1>Create Your Account</h1>

    <form id="signup-form" novalidate>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@example.com" required>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Min 6 characters" minlength="6" required>
      </div>

      <div class="form-group">
        <label for="confirm-password">Confirm Password</label>
        <input type="password" id="confirm-password" placeholder="Type password again" minlength="6" required>
      </div>

      <div id="auth-message" class="auth-message"></div>

      <button type="submit" id="submit-btn">Sign Up</button>
    </form>

    <p class="auth-link">
      Already have an account? <a href="login.html">Log in</a>
    </p>
    <p class="auth-link" style="margin-top:8px;font-size:0.8em;">
      <a href="privacy.html">Privacy Policy</a>
    </p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="auth.js"></script>
  <script>
    const form = document.getElementById('signup-form');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const confirmInput = document.getElementById('confirm-password');
    const messageDiv = document.getElementById('auth-message');
    const submitBtn = document.getElementById('submit-btn');

    function showMessage(text, type) {
      messageDiv.textContent = text;
      messageDiv.className = 'auth-message ' + type;
    }

    // If already logged in, send to calendar
    getCurrentUser().then(function (user) {
      if (user) {
        window.location.href = 'index.html';
      }
    });

    form.addEventListener('submit', async function (event) {
      event.preventDefault();

      const email = emailInput.value.trim();
      const password = passwordInput.value;
      const confirmPassword = confirmInput.value;

      if (!email || !password || !confirmPassword) {
        showMessage('Please fill in all fields.', 'error');
        return;
      }

      if (password !== confirmPassword) {
        showMessage('Passwords do not match.', 'error');
        return;
      }

      if (password.length < 6) {
        showMessage('Password must be at least 6 characters.', 'error');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Creating account...';

      try {
        const result = await signUp(email, password);
        if (!result.session) {
          showMessage('Account created! Check your email (' + email + ') for a confirmation link, then log in.', 'success');
          return;
        }
        showMessage('Account created! Redirecting to your calendar...', 'success');
        setTimeout(function () {
          window.location.href = 'index.html';
        }, 1500);
      } catch (error) {
        showMessage(error.message || 'An error occurred during sign up.', 'error');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Sign Up';
      }
    });
  </script>

</body>
</html>
